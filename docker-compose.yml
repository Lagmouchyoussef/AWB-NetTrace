services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-awb_nettrace}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Backend
    ports:
      - "8443:8443"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-awb_nettrace}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:?SSL_KEYSTORE_PASSWORD is required}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:?APP_SECURITY_JWT_SECRET is required}
      APP_SECURITY_DEMO_USERS_PASSWORD: ${APP_SECURITY_DEMO_USERS_PASSWORD:?APP_SECURITY_DEMO_USERS_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./Frontend
    expose:
      - "4201"
    volumes:
      - ./Frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

  frontend-proxy:
    image: nginx:1.27-alpine
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Frontend/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend

volumes:
  db-data:
  frontend-node-modules:
