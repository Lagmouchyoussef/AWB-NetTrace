name: OWASP ZAP baseline scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start db + backend
        env:
          DB_NAME: zap_scan
          DB_USERNAME: zap_scan_user
          DB_PASSWORD: zap-scan-only-password-0000000000
          SSL_KEYSTORE_PASSWORD: zap-scan-only-keystore-password-0000
          APP_SECURITY_JWT_SECRET: zap-scan-only-jwt-secret-never-used-elsewhere-0000
          APP_SECURITY_DEMO_USERS_PASSWORD: zap-scan-only-demo-password-0000
        run: |
          docker compose up -d --build db backend
          echo "Waiting for backend to become reachable..."
          for i in $(seq 1 30); do
            if curl -sk -o /dev/null https://localhost:8443/api/auth/me; then
              echo "Backend is up."
              break
            fi
            sleep 5
          done

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://localhost:8443"
          cmd_options: "-I"
          fail_action: false

      - name: Stop stack
        if: always()
        run: docker compose down
