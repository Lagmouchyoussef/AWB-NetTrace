name: OWASP ZAP baseline scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start db + backend
        env:
          DB_NAME: zap_scan
          DB_USERNAME: zap_scan_user
          DB_PASSWORD: zap-scan-only-password-0000000000
          SSL_KEYSTORE_PASSWORD: DevLocalOnly_ChangeMe_2026!
          APP_SECURITY_JWT_SECRET: zap-scan-only-jwt-secret-never-used-elsewhere-0000
          APP_SECURITY_DEMO_USERS_PASSWORD: zap-scan-only-demo-password-0000
        run: |
          docker compose up -d --build db backend
          echo "Waiting for backend to become reachable..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8443/ || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "Backend is up (HTTP $HTTP_CODE)."
              break
            fi
            sleep 5
          done
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://localhost:8443/ || echo "000")
          if [ "$HTTP_CODE" == "000" ]; then
            echo "Backend failed to start within timeout"
            docker compose logs backend
            exit 1
          fi

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://localhost:8443"
          cmd_options: "-I"
          fail_action: false

      - name: Stop stack
        if: always()
        env:
          DB_NAME: zap_scan
          DB_USERNAME: zap_scan_user
          DB_PASSWORD: zap-scan-only-password-0000000000
          SSL_KEYSTORE_PASSWORD: DevLocalOnly_ChangeMe_2026!
          APP_SECURITY_JWT_SECRET: zap-scan-only-jwt-secret-never-used-elsewhere-0000
          APP_SECURITY_DEMO_USERS_PASSWORD: zap-scan-only-demo-password-0000
        run: docker compose down
