name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    env:
      APP_SECURITY_JWT_SECRET: ci-only-test-secret-never-used-outside-pipelines-0000000000
      APP_SECURITY_DEMO_USERS_PASSWORD: ci-test-password-never-real
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: awb_nettrace_test
      DB_USERNAME: ci_test_user
      DB_PASSWORD: ci_test_password
      SSL_KEYSTORE_PASSWORD: DevLocalOnly_ChangeMe_2026!
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: awb_nettrace_test
          POSTGRES_USER: ci_test_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Maven wrapper is executable
        run: chmod +x mvnw

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: Backend/pom.xml

      - name: Format check (Spotless)
        run: ./mvnw -B spotless:check

      - name: Lint (Checkstyle)
        run: ./mvnw -B checkstyle:check

      - name: Compile
        run: ./mvnw -B compile

      - name: Test
        run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npx ng test --watch=false --browsers=ChromeHeadless
