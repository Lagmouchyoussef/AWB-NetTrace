name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    env:
      APP_SECURITY_JWT_SECRET: ci-only-test-secret-never-used-outside-pipelines-0000000000
      APP_SECURITY_ADMIN_USERNAME: ci-test-admin
      APP_SECURITY_ADMIN_PASSWORD: ci-test-password-never-real
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: Backend/pom.xml

      - name: Compile
        run: ./mvnw -B compile

      - name: Test
        run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npx ng test --watch=false
