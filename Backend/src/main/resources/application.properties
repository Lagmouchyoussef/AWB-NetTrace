spring.application.name=Backend

spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.include-binding-errors=never
spring.web.error.include-exception=false
spring.web.error.whitelabel.enabled=false

app.cors.allowed-origins=https://localhost:4200

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- TLS / HTTPS (active en local, certificat auto-signe) ---
server.port=8443
server.address=0.0.0.0
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=awb-nettrace

# --- Base de donnees ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:awb_nettrace}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
