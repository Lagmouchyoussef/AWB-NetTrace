springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- TLS / HTTPS (documented, NOT activated) ---
# To activate for a real deployment:
#   1. Generate/obtain a keystore, e.g.:
#      keytool -genkeypair -alias awb-nettrace -keyalg RSA -keysize 2048 \
#        -storetype PKCS12 -keystore keystore.p12 -validity 3650
#   2. Uncomment the block below and supply real values via environment
#      variables (never commit a real keystore or its password).
#   3. Terminate TLS either here OR in a reverse proxy (nginx/ALB) - not both.
#
# server.port=8443
# server.ssl.enabled=true
# server.ssl.key-store=classpath:keystore.p12
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=awb-nettrace
# server.ssl.protocol=TLS
# server.ssl.enabled-protocols=TLSv1.3,TLSv1.2
