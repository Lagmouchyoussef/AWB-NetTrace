worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  server {
    listen 4200 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/dev-cert.pem;
    ssl_certificate_key /etc/nginx/certs/dev-key.pem;

    # frame-ancestors only takes effect via this HTTP header (the CSP spec ignores it when
    # delivered via <meta>, which index.html deliberately no longer sets to avoid a console
    # warning on every page load) - this is the one place it's actually enforced.
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # No public entry point: nothing lists the 7 role-login URLs, so a real 404 (not
    # just an empty 200 page) is returned here. The Vite HMR websocket also connects
    # on "/", so it must still be let through to the upstream dev server.
    location = / {
      if ($http_upgrade != "websocket") {
        return 404;
      }
      proxy_pass http://frontend:4201;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location = /login {
      return 404;
    }

    location / {
      proxy_pass http://frontend:4201;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
