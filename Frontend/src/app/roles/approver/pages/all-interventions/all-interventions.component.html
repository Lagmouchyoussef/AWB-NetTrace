<div class="page">
  <div class="page-header">
    <h1>{{ 'approver.allInterventions.pageTitle' | translate }}</h1>
    <p class="page-subtitle">{{ 'approver.allInterventions.subtitle' | translate }}</p>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="data()"
    [totalCount]="totalCount()"
    [loading]="loading()"
    [readOnly]="true"
    (page)="onPage($event)"
    (sortChange)="onSort($event)"
    (searchChange)="onSearch($event)"
  />
</div>
