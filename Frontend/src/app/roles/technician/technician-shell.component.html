<div class="shell">
  <header class="topbar">
    <img class="topbar-logo" src="attijariwafa-logo.png" alt="Attijariwafa Bank" />
    <span class="topbar-title">AWB-NetTrace</span>
    <span class="topbar-user">{{ username() }}</span>
  </header>

  <main class="content">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    @for (item of navItems; track item.path) {
      <a class="nav-item" [routerLink]="item.path" routerLinkActive="nav-item-active">
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="nav-label">{{ item.labelKey | translate }}</span>
      </a>
    }
  </nav>
</div>
