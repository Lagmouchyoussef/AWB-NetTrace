<div class="page">
  <div class="page-header">
    <h1>{{ 'aiInsights.pageTitle' | translate }}</h1>
  </div>

  <app-data-table
    [columns]="columns"
    [data]="data()"
    [totalCount]="totalCount()"
    [loading]="loading()"
    (page)="onPage($event)"
    (sortChange)="onSort($event)"
    (searchChange)="onSearch($event)"
    (view)="onView($event)"
    (edit)="onView($event)"
    (delete)="onDismiss($event)"
    (exportCsv)="onExportCsv()"
  />
</div>
