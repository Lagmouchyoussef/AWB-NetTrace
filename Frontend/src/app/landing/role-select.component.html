<div class="login-page">
  <div class="login-card-border state-idle">
    <div class="login-card">
      <div class="login-logo">
        <img src="attijariwafa-logo.png" alt="Attijariwafa Bank" />
      </div>
      <p class="select-intro">Select your role to sign in</p>
      <div class="role-list">
        @for (role of roles; track role) {
          <a class="role-link" [routerLink]="['/' + slugs[role] + '-login']">{{ labels[role] }}</a>
        }
      </div>
    </div>
  </div>
</div>
