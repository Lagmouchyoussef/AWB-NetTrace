<div class="login-page">
  <div class="login-card-border state-idle">
    <div class="login-card">
      <div class="login-logo">
        <img src="attijariwafa-logo.png" alt="Attijariwafa Bank" />
      </div>

      @if (!submitted()) {
        <p class="forgot-intro">{{ 'auth.forgotIntro' | translate }}</p>
        <form (ngSubmit)="onSubmit()">
          <div class="login-field">
            <label for="username">{{ 'auth.username' | translate }}</label>
            <input id="username" name="username" type="text" [(ngModel)]="username" required />
          </div>
          <button type="submit" class="login-submit">{{ 'auth.sendRequest' | translate }}</button>
        </form>
      } @else {
        <p class="forgot-success">{{ 'auth.forgotSuccess' | translate }}</p>
      }

      <div class="login-forgot">
        <a routerLink="/">{{ 'auth.backToLogin' | translate }}</a>
      </div>
    </div>
  </div>
</div>
