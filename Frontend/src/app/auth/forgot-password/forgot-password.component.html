<div class="login-page">
  <div class="login-card-border state-idle">
    <div class="login-card">
      <div class="login-logo">
        <img src="attijariwafa-logo.png" alt="Attijariwafa Bank" />
      </div>

      @if (!submitted()) {
        <p class="forgot-intro">
          Enter your username and your system administrator will be notified to help you reset your
          password.
        </p>
        <form (ngSubmit)="onSubmit()">
          <div class="login-field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" [(ngModel)]="username" required />
          </div>
          <button type="submit" class="login-submit">Send request</button>
        </form>
      } @else {
        <p class="forgot-success">
          If an account exists for this username, your administrator has been notified.
        </p>
      }

      <div class="login-forgot">
        <a routerLink="/">Back to login</a>
      </div>
    </div>
  </div>
</div>
