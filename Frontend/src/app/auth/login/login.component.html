<div class="login-page">
  <div class="login-card-border" [class]="'state-' + borderState()">
    <div class="login-card">
      <div class="login-logo">
        <img src="attijariwafa-logo.png" alt="Attijariwafa Bank" />
      </div>
      <form (ngSubmit)="onSubmit()">
        <div class="login-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" [(ngModel)]="username" required />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input
              id="password"
              name="password"
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              required
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
            >
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor">
                  <path
                    d="M3 3l18 18M10.58 10.58a2 2 0 1 0 2.83 2.83M9.88 4.24A9.94 9.94 0 0 1 12 4c5.5 0 9.5 4.5 10 8-.26 1-.74 2.06-1.4 3.06M6.6 6.6C4.4 8 2.9 10 2 12c1.06 3.5 4.5 8 10 8 1.3 0 2.5-.24 3.6-.66"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor">
                  <path
                    d="M2 12c1.5-3.5 5.5-8 10-8s8.5 4.5 10 8c-1.5 3.5-5.5 8-10 8s-8.5-4.5-10-8Z"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <circle cx="12" cy="12" r="3" stroke-width="1.8" />
                </svg>
              }
            </button>
          </div>
        </div>
        <div class="login-forgot">
          <a routerLink="/forgot-password">Forgot password?</a>
        </div>
        @if (errorMessage()) {
          <p class="login-error">{{ errorMessage() }}</p>
        }
        <button type="submit" class="login-submit" [disabled]="loading()">
          {{ loading() ? 'Logging in...' : 'Log in' }}
        </button>
      </form>
    </div>
  </div>
</div>
